name: ▶️ Build FF1 Image for Radxa X4

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version'
        required: true
        default: '0.0.1'
      soak-test:
        description: 'Include soak test'
        required: true
        type: choice
        options:
          - true
          - false
        default: false
      environment:
        description: "Environment to build"
        required: true
        default: "Development"
        type: choice
        options:
          - Development
          - Production
      iso_type:
        description: "ISO type to build"
        required: true
        default: "Normal (emmc)"
        type: choice
        options:
          - Normal (emmc)
          - Normal (full)
          - Development (emmc)
          - Development (full)
          - QEMU
      pacman_snapshot:
        description: "Pacman repository snapshot to use"
        required: false
        default: "2025/05/31"
        type: choice
        options:
          - "2025/05/31"
          - "latest"
      webapp_url:
        description: "Optional: WebApp URL to include in ff1-config.json"
        required: false
        default: ""
      ffos_user_ref:
        description: 'ffos-user repository reference'
        required: true
        type: string
        default: 'develop'

jobs:
  permission-check:
    name: Permission Check
    uses: ./.github/workflows/permission-check.yaml

  build-feral-connectd:
    needs: permission-check
    name: Build Feral Connectd
    uses: ./.github/workflows/build-components.yaml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    with:
      component: feral-connectd
      version: ${{ inputs.version || github.event.inputs.version }}
      description: 'Feral File Connectd Service'
      maintainer: 'Feral File'
      environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}
      ffos_user_ref: ${{ inputs.ffos_user_ref || github.event.inputs.ffos_user_ref }}
      
  build-feral-setupd:
    needs: permission-check
    name: Build Feral Setupd
    uses: ./.github/workflows/build-components.yaml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    with:
      component: feral-setupd
      version: ${{ inputs.version || github.event.inputs.version }}
      description: 'Feral File Setup Service'
      maintainer: 'Feral File'
      environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}
      ffos_user_ref: ${{ inputs.ffos_user_ref || github.event.inputs.ffos_user_ref }}

  build-feral-sys-monitord:
    needs: permission-check
    name: Build Feral System Monitord
    uses: ./.github/workflows/build-components.yaml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    with:
      component: feral-sys-monitord
      version: ${{ inputs.version || github.event.inputs.version }}
      description: 'Feral File System Monitord'
      maintainer: 'Feral File'
      environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}
      ffos_user_ref: ${{ inputs.ffos_user_ref || github.event.inputs.ffos_user_ref }}

  build-feral-app-monitord:
    needs: permission-check
    name: Build Feral App Monitord
    uses: ./.github/workflows/build-components.yaml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    with:
      component: feral-app-monitord
      version: ${{ inputs.version || github.event.inputs.version }}
      description: 'Feral File App Monitord'
      maintainer: 'Feral File'
      environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}
      ffos_user_ref: ${{ inputs.ffos_user_ref || github.event.inputs.ffos_user_ref }}

  build-feral-watchdog:
    needs: permission-check
    name: Build Feral Watchdog
    uses: ./.github/workflows/build-components.yaml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
    with:
      component: feral-watchdog
      version: ${{ inputs.version || github.event.inputs.version }}
      description: 'Feral File Watchdog'
      maintainer: 'Feral File'
      environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}
      ffos_user_ref: ${{ inputs.ffos_user_ref || github.event.inputs.ffos_user_ref }}

  build-feralfile-pacman-repo:
    name: Build Feralfile pacman repo
    needs: [permission-check, build-feral-connectd, build-feral-setupd, build-feral-sys-monitord, build-feral-app-monitord, build-feral-watchdog]
    uses: ./.github/workflows/pacman-repo.yaml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
    with:
      environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}

  build-image:
    name: Generate Arch Linux Image for Radxa X4
    runs-on: ubuntu-latest
    needs: [permission-check, build-feralfile-pacman-repo]
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}

    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout ffos-user Repository
        uses: actions/checkout@v4
        with:
          repository: feral-file/ffos-user
          ref: ${{ inputs.ffos_user_ref || github.event.inputs.ffos_user_ref }}
          path: ffos-user
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Install Build Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso arch-install-scripts dosfstools libisoburn squashfs-tools \
            git curl rclone wget base-devel jq zip unzip fakeroot binutils

      - name: Copy archiso profile and setup home directories
        run: |
          mkdir -p /build
          cp -r archiso-ff1 /build/
          
          # Create home directory structure
          mkdir -p /build/archiso-ff1/airootfs/home
          
          # Copy user data from ffos-user repository
          cp -r ffos-user/users/feralfile /build/archiso-ff1/airootfs/home/
          
          if [ "${{ inputs.soak-test }}" == "false" ]; then
            # Remove soaktest if not needed
            rm -f /build/archiso-ff1/efiboot/loader/entries/archiso-x86_64-linux-soak-test.conf
            rm -f /build/archiso-ff1/airootfs/usr/local/bin/websocat
          else 
            # Copy soaktest user data
            cp -r ffos-user/users/soaktest /build/archiso-ff1/airootfs/home/
            
            cat >> /build/archiso-ff1/packages.x86_64 << EOF
          # soak test tools
          foot
          bc
          stress-ng
          mesa-utils
          python-rich
          EOF
          fi 

      - name: Update EFI boot option
        if: ${{ (inputs.iso_type == "Normal (emmc)" || inputs.iso_type == "Development (emmc)") }}
        run: |
          cat >> /build/archiso-ff1/efiboot/loader/loader.conf << EOF
          default archiso-x86_64-linux-emmc-installation.conf
          timeout 0
          EOF

      - name: Update start-kiosk.sh
        run: |
          if [ ${{ inputs.iso_type == "QEMU" }} ]; then
            # Remove --kiosk flag from start-kiosk.sh
            sed -i 's/wlr-randr --output HDMI-A-1 --transform $ROTATION &&//' /build/archiso-ff1/airootfs/home/feralfile/scripts/start-kiosk.sh
          else if [ ${{ inputs.iso_type == "Development (full)" || inputs.iso_type == "Development (emmc)" }} ]; then
            # Remove --kiosk flag from start-kiosk.sh
            sed -i 's/--kiosk//' /build/archiso-ff1/airootfs/home/feralfile/scripts/start-kiosk.sh
          fi

      - name: Add development tools to packages list
        if: ${{ (inputs.iso_type == "Development (full)" || inputs.iso_type == "Development (emmc)") }}
        run: |
          # Add Go and Rust to packages list
          cat >> /build/archiso-ff1/packages.x86_64 << EOF

          # Development tools
          go
          rust
          base-devel
          EOF
          
          # Configure pacman to not ask for input
          sed -i 's/#NoConfirm/NoConfirm/' /etc/pacman.conf 2>/dev/null || echo "NoConfirm" >> /etc/pacman.conf

      - name: Setup source directory and copy components
        if: ${{ (inputs.iso_type == "Development (full)" || inputs.iso_type == "Development (emmc)") }}
        run: |
          # Create source directory
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/src
          
          # Create a file with repository information
          echo "Branch: ${{ github.ref_name }}" > /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          echo "Version: ${{ inputs.version || github.event.inputs.version }}" >> /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          echo "Build Date: $(date)" >> /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          
          # Copy components directory with current checkout
          cp -r ffos-user/components /build/archiso-ff1/airootfs/home/feralfile/src/

      - name: Inject pacman.conf
        env:
          AUTH_USER: ${{ secrets.DISTRIBUTION_AUTH_USER }}
          AUTH_PASS: ${{ secrets.DISTRIBUTION_AUTH_PASSWORD }}
        run: |
          set -e

          ENCODED_USER=$(printf '%s' "$AUTH_USER" | jq -sRr @uri)
          ENCODED_PASS=$(printf '%s' "$AUTH_PASS" | jq -sRr @uri)

          if [ "${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}" = "Production" ]; then
            DOMAIN="ff1.feral-file.workers.dev"
          else
            DOMAIN="feralfile-device-distribution.bitmark-development.workers.dev"
          fi

          cat >> /build/archiso-ff1/pacman.conf << EOF
          [feralfile]
          SigLevel = Optional TrustAll
          Server = https://${ENCODED_USER}:${ENCODED_PASS}@${DOMAIN}/archlinux/${{ github.ref_name }}/os/\$arch
          EOF

          cp /build/archiso-ff1/pacman.conf /build/archiso-ff1/airootfs/etc/pacman.conf

      - name: Copy UI files
        run: |
          mkdir -p /build/archiso-ff1/airootfs/opt/feral/ui/launcher
          cp -r ffos-user/components/launcher-ui/* /build/archiso-ff1/airootfs/opt/feral/ui/launcher/
          mkdir -p /build/archiso-ff1/airootfs/opt/feral/ui/player
          cp -r ffos-user/components/player-wrapper-ui/* /build/archiso-ff1/airootfs/opt/feral/ui/player/
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/.logs

      - name: Add Configs and Services
        run: |
          if [ "${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}" = "Production" ]; then
            ENDPOINT="https://ff1.feral-file.workers.dev"
          else
            ENDPOINT="https://feralfile-device-distribution.bitmark-development.workers.dev"
          fi

          # Add connectd config
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/.config
          cat > /build/archiso-ff1/airootfs/home/feralfile/.config/connectd.json << EOF
          {
            "relayer": {
                "endpoint": "${{ vars.RELAYER_ENDPOINT }}",
                "apiKey": "${{ secrets.RELAYER_API_KEY }}"
            },
            "cdp": {
                "endpoint": "http://127.0.0.1:9222"
            },
            "sentry": {
                "dsn": "${{ secrets.SENTRY_DSN_CONNECTD }}",
                "debug": "false",
                "sample_rate": "${{ (github.event.inputs.environment == 'Production' || github.ref == 'refs/heads/main') && '0.1' || '1.0' }}",
                "environment": "${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Production' || 'Development') }}",
                "release": "${{ inputs.version || github.event.inputs.version }}",
                "repository": "${{ github.repository }}"
            }
          }
          EOF
          chmod 755 /build/archiso-ff1/airootfs/home/feralfile/.config/connectd.json

          # Add watchdog config
          cat > /build/archiso-ff1/airootfs/home/feralfile/.config/watchdog.json << EOF
          {
            "cdp_endpoint": "http://127.0.0.1:9222"
          }
          EOF

          WEBAPP_URL="${{ inputs.webapp_url || github.event.inputs.webapp_url }}"
          jq -n \
            --arg branch "${{ github.ref_name }}" \
            --arg version "${{ inputs.version || github.event.inputs.version }}" \
            --arg dist_acc "${{ secrets.DISTRIBUTION_AUTH_USER }}" \
            --arg dist_pass "${{ secrets.DISTRIBUTION_AUTH_PASSWORD }}" \
            --arg endpoint "${ENDPOINT}" \
            --arg heartbeat "${{ secrets.HEARTBEAT_ENDPOINT }}" \
            --arg webapp_url "${WEBAPP_URL}" \
            '{
              branch: $branch,
              version: $version,
              distribution_acc: $dist_acc,
              distribution_pass: $dist_pass,
              endpoint: $endpoint,
              heartbeat_endpoint: $heartbeat
            } + (if $webapp_url != "" then {webapp_url: $webapp_url} else {} end)' \
            > /build/archiso-ff1/airootfs/home/feralfile/ff1-config.json
          chmod 755 /build/archiso-ff1/airootfs/home/feralfile/ff1-config.json

      - name: Setup pacman
        run: |
          if [ "${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}" = "latest" ]; then
            # Use latest Arch Linux repositories - download US mirrors
            echo "Using latest Arch Linux repositories"
            curl -o /etc/pacman.d/mirrorlist "https://archlinux.org/mirrorlist/?country=US&protocol=https&ip_version=4&use_mirror_status=on"
            sed -i 's/^#Server/Server/' /etc/pacman.d/mirrorlist
          else
            # Use Arch Linux Archive snapshot (default: May 31, 2025)
            SNAPSHOT_DATE="${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}"
            echo "Using Arch Linux Archive snapshot: $SNAPSHOT_DATE"
            cat > /etc/pacman.d/mirrorlist << EOF
          # Arch Linux Archive - $SNAPSHOT_DATE snapshot
          Server = https://archive.archlinux.org/repos/$SNAPSHOT_DATE/\$repo/os/\$arch
          EOF
          fi
          
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syy --debug

          # CRITICAL: Create and set up the mirrorlist for the archiso build environment
          mkdir -p /build/archiso-ff1/pacman.d
          cp /etc/pacman.d/mirrorlist /build/archiso-ff1/pacman.d/mirrorlist
          
          # Also copy mirror list to the final ISO
          mkdir -p /build/archiso-ff1/airootfs/etc/pacman.d
          cp /etc/pacman.d/mirrorlist /build/archiso-ff1/airootfs/etc/pacman.d/mirrorlist

      - name: Build ISO Image
        run: |
          cd /build
          mkarchiso -v -w /build/work -o /build/out /build/archiso-ff1
          ISO_FILE=$(find /build/out -name "*.iso" | head -n 1)
          if [ -f "$ISO_FILE" ]; then
            IMAGE_TYPE="${{ (inputs.iso_type == "Development (full)" || inputs.iso_type == "Development (emmc)") && 'dev-' || (inputs.iso_type == "QEMU") && 'qemu-' || '' }}"
            if [ "${{ github.ref_name }}" = "release" ]; then
              IMAGE_TAG="release"
            elif [ "${{ github.ref_name }}" = "demo" ]; then
              IMAGE_TAG="demo"
            elif [ "${{ github.ref_name }}" = "develop" ]; then
              IMAGE_TAG="develop"
            else
              IMAGE_TAG="other"
            fi
            NEW_NAME="FF1-${IMAGE_TAG}-${IMAGE_TYPE}${{ inputs.version || github.event.inputs.version }}.iso"
            mv "$ISO_FILE" "/build/out/$NEW_NAME"
            echo "ISO created: /build/out/$NEW_NAME"
          else
            echo "Error: ISO file not found"
            exit 1
          fi

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Compress and Upload Image
        run: |
          cd /build/out
          IMAGE_TYPE="${{ (inputs.iso_type == "Development (full)" || inputs.iso_type == "Development (emmc)") && 'dev-' || (inputs.iso_type == "QEMU" || github.event.inputs.iso_type == "QEMU") && 'qemu-' || '' }}"
          if [ "${{ github.ref_name }}" = "release" ]; then
            IMAGE_TAG="release"
          elif [ "${{ github.ref_name }}" = "demo" ]; then
            IMAGE_TAG="demo"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            IMAGE_TAG="develop"
          else
            IMAGE_TAG="other"
          fi
          ISO_FILE="FF1-${IMAGE_TAG}-${IMAGE_TYPE}${{ inputs.version || github.event.inputs.version }}.iso"
          ZIP_FILE="FF1-${IMAGE_TAG}-${IMAGE_TYPE}${{ inputs.version || github.event.inputs.version }}.zip"
          zip -j "$ZIP_FILE" "$ISO_FILE"
          rclone copyto "$ZIP_FILE" \
            "r2:${{vars.CLOUDFLARE_R2_BUCKET_NAME}}/${{ github.ref_name }}/$ZIP_FILE" \
            --s3-upload-cutoff=100M \
            --s3-chunk-size=100M \
            --transfers=7 \
            --verbose \
            --stats=1s
          echo "Image successfully uploaded to R2: ${ZIP_FILE}"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /build 