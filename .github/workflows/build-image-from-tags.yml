name: ▶️ Build FFOS Image From Tags

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image and local package version"
        required: true
        default: "0.0.1"
      ffos_ref:
        description: "ffos git tag/ref to checkout"
        required: true
        default: "v1.0.1"
      ffos_user_ref:
        description: "ffos-user git tag/ref to checkout"
        required: true
        default: "v1.0.1"
      ff_player_ref:
        description: "Optional feral-player repository reference to build local player package"
        required: false
        default: ""
        type: string
      soak-test:
        description: "Include soak test"
        required: true
        type: choice
        options:
          - true
          - false
        default: false
      environment:
        description: "Environment to build"
        required: true
        default: "Development"
        type: choice
        options:
          - Development
          - Staging
          - Production
      pacman_snapshot:
        description: "Pacman repository snapshot to use"
        required: false
        default: "2025/11/25"
        type: choice
        options:
          - "2025/11/25"
          - "2025/05/31"
          - "latest"
      dev_iso:
        description: "Build development ISO"
        required: true
        default: false
        type: boolean
      enable_local_hub:
        description: "Enable local hub for communication"
        required: false
        default: true
        type: boolean
permissions:
  id-token: write
  contents: read

jobs:
  permission-check:
    name: Permission Check
    uses: ./.github/workflows/permission-check.yaml

  resolve-container:
    needs: permission-check
    uses: ./.github/workflows/resolve-container.yaml
    with:
      pacman_snapshot: ${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}

  determine-local-player:
    name: Determine Local Player Support
    needs: permission-check
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check if ffos tag supports local player
        id: check
        env:
          FFOS_REF: ${{ inputs.ffos_ref }}
          FF_PLAYER_REF: ${{ inputs.ff_player_ref }}
        run: |
          set -euo pipefail

          MIN_VERSION="1.0.13"
          REF="${FFOS_REF#refs/tags/}"
          REF="${REF#v}"

          if [ -z "${FF_PLAYER_REF}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping local player: ff_player_ref not provided."
            exit 0
          fi

          if ! [[ "$REF" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping local player: ffos_ref '${FFOS_REF}' is not a supported version tag."
            exit 0
          fi

          VERSION="$(printf '%s' "$REF" | grep -Eo '^[0-9]+\.[0-9]+\.[0-9]+')"

          if [ "$(printf '%s\n' "$MIN_VERSION" "$VERSION" | sort -V | head -n1)" = "$MIN_VERSION" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Local player enabled for ffos_ref ${FFOS_REF}."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping local player: ffos_ref ${FFOS_REF} is below v${MIN_VERSION}."
          fi

  build-image:
    name: Generate FFOS iso from tags
    needs: [permission-check, resolve-container, determine-local-player]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    container:
      image: ${{ needs.resolve-container.outputs.image }}
      options: --privileged

    steps:
      - name: Checkout ffos repository at tag/ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ffos_ref }}

      - name: Checkout ffos-user Repository at tag/ref
        uses: actions/checkout@v4
        with:
          repository: feral-file/ffos-user
          ref: ${{ inputs.ffos_user_ref }}
          path: ffos-user
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Checkout feral-player Repository at ref
        if: ${{ needs.determine-local-player.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: feral-file/ff-player
          ref: ${{ inputs.ff_player_ref }}
          path: feral-player
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup Node.js
        if: ${{ needs.determine-local-player.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: feral-player/package-lock.json

      - name: Setup pacman
        run: |
          SNAPSHOT="${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}"
          if [ "$SNAPSHOT" = "latest" ]; then
            echo "Using latest Arch Linux repositories"
            curl -o /etc/pacman.d/mirrorlist \
              "https://archlinux.org/mirrorlist/?country=US&protocol=https&ip_version=4&use_mirror_status=on"
            sed -i 's/^#Server/Server/' /etc/pacman.d/mirrorlist
          else
            echo "Using Arch Linux Archive snapshot: $SNAPSHOT"
            {
              echo "# Arch Linux Archive - ${SNAPSHOT} snapshot"
              echo "Server = https://archive.archlinux.org/repos/${SNAPSHOT}/\$repo/os/\$arch"
            } > /etc/pacman.d/mirrorlist
          fi
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syy

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm archiso arch-install-scripts dosfstools libisoburn squashfs-tools \
            git curl rclone wget base-devel jq zip unzip fakeroot binutils openssl aws-cli \
            pacman-contrib shadow go rust cargo

      - name: Build local feral-player bundle
        if: ${{ needs.determine-local-player.outputs.enabled == 'true' }}
        working-directory: feral-player
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ inputs.environment }}
          NEXT_PUBLIC_PUB_DOC_URL: ${{ vars.PUB_DOC_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_PLAYER }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NEXT_PUBLIC_PUB_DOC_URL}" ]; then
            echo "::error::Missing required environment variable: NEXT_PUBLIC_PUB_DOC_URL"
            exit 1
          fi

          npm ci
          NEXT_PUBLIC_DISABLE_VERSION_CHECK=true npm run build

      - name: Build local FFOS packages (no R2 upload)
        env:
          PKG_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          COMPONENTS=(
            feral-controld
            feral-setupd
            feral-sys-monitord
            feral-watchdog
          )

          useradd -m builder || true
          mkdir -p /build/local-repo/x86_64

          for COMP in "${COMPONENTS[@]}"; do
            WORKDIR="$GITHUB_WORKSPACE/ffos-user/components/$COMP"
            TARBALL="${COMP}_${PKG_VERSION}.tar.gz"

            cd "$WORKDIR"
            rm -f ./*.pkg.tar.zst ./*.pkg.tar.zst.sig "$TARBALL" PKGBUILD

            tar czf "/tmp/${TARBALL}" --exclude="${TARBALL}" .
            mv "/tmp/${TARBALL}" .

            if [ -f "Cargo.toml" ]; then
              BINARY_NAME=$(grep -m 1 '^[[:space:]]*name[[:space:]]*=' Cargo.toml | cut -d '"' -f 2 || true)
              if [ -z "$BINARY_NAME" ]; then
                BINARY_NAME="$COMP"
              fi
              cat <<EOF > PKGBUILD
          # Maintainer: GitHub Actions
          pkgname=${COMP}
          pkgver=${PKG_VERSION}
          pkgrel=1
          pkgdesc="Feral File component package"
          arch=('x86_64' 'aarch64')
          url="https://github.com/${{ github.repository }}"
          license=('MIT')
          depends=()
          makedepends=('rust' 'cargo')
          options=(!strip)
          source=("${TARBALL}")
          sha256sums=('SKIP')

          build() {
            cd "\$srcdir"
            cargo build --profile=release
          }

          package() {
            install -Dm755 "\$srcdir/target/release/${BINARY_NAME}" "\$pkgdir/usr/bin/${COMP}"
          }
          EOF
            else
              cat <<EOF > PKGBUILD
          # Maintainer: GitHub Actions
          pkgname=${COMP}
          pkgver=${PKG_VERSION}
          pkgrel=1
          pkgdesc="Feral File component package"
          arch=('x86_64' 'aarch64')
          url="https://github.com/${{ github.repository }}"
          license=('MIT')
          depends=()
          makedepends=('go')
          options=(!strip)
          source=("${TARBALL}")
          sha256sums=('SKIP')

          build() {
            cd "\$srcdir"
            go build -v -o "${COMP}"
          }

          package() {
            install -Dm755 "\$srcdir/${COMP}" "\$pkgdir/usr/bin/${COMP}"
          }
          EOF
            fi

            chown -R builder:builder "$WORKDIR"
            su builder -c "cd \"$WORKDIR\" && makepkg -f --skipinteg"
            cp ./*.pkg.tar.zst /build/local-repo/x86_64/
          done

          if [ "${{ needs.determine-local-player.outputs.enabled }}" = "true" ]; then
            PLAYER_PKG_DIR=/tmp/feral-player-pkg
            PLAYER_TARBALL="feral-player_${PKG_VERSION}.tar.gz"
            PLAYER_OUT="$GITHUB_WORKSPACE/feral-player/out"

            rm -rf "$PLAYER_PKG_DIR"
            mkdir -p "$PLAYER_PKG_DIR"
            tar czf "$PLAYER_PKG_DIR/$PLAYER_TARBALL" -C "$PLAYER_OUT" .

            cd "$PLAYER_PKG_DIR"
            cat <<EOF > PKGBUILD
          # Maintainer: GitHub Actions
          pkgname=feral-player
          pkgver=${PKG_VERSION}
          pkgrel=1
          pkgdesc="FF Player Static Web Application"
          arch=('x86_64' 'aarch64')
          url="https://github.com/feral-file/ff-player"
          license=('MIT')
          depends=()
          options=(!strip)
          source=("${PLAYER_TARBALL}")
          sha256sums=('SKIP')

          package() {
            install -dm755 "\$pkgdir/opt/feral/feral-player"
            cp -r "\$srcdir"/. "\$pkgdir/opt/feral/feral-player/"
          }
          EOF

            chown -R builder:builder "$PLAYER_PKG_DIR"
            su builder -c "cd \"$PLAYER_PKG_DIR\" && makepkg -f --skipinteg"
            cp ./*.pkg.tar.zst /build/local-repo/x86_64/
          fi

          cd /build/local-repo/x86_64
          repo-add feralfile-local.db.tar.gz ./*.pkg.tar.zst

      - name: Apply version-specific patches
        run: |
          if [ "${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}" = "2025/05/31" ]; then
            echo "Applying patches for 2025/05/31 snapshot..."
            sed -i "s/bootmodes=('uefi.systemd-boot')/bootmodes=('uefi-x64.systemd-boot.esp' 'uefi-x64.systemd-boot.eltorito')/" archiso-ff1/profiledef.sh
            sed -i 's/wlroots0.18/wlroots/' archiso-ff1/packages.x86_64
          fi

      - name: Copy archiso profile and setup home directories
        run: |
          mkdir -p /build
          cp -r archiso-ff1 /build/

          mkdir -p /build/archiso-ff1/airootfs/home
          cp -r ffos-user/users/feralfile /build/archiso-ff1/airootfs/home/

          if [ "${{ inputs.soak-test }}" = "false" ]; then
            rm -f /build/archiso-ff1/efiboot/loader/entries/archiso-x86_64-linux-soak-test.conf
            rm -f /build/archiso-ff1/airootfs/usr/local/bin/websocat
          else
            cp -r ffos-user/users/soaktest /build/archiso-ff1/airootfs/home/
            cat >> /build/archiso-ff1/packages.x86_64 << EOF
          # soak test tools
          foot
          bc
          stress-ng
          mesa-utils
          python-rich
          EOF
          fi

          mkdir -p /build/archiso-ff1/pacman.d
          cp /etc/pacman.d/mirrorlist /build/archiso-ff1/pacman.d/mirrorlist

          mkdir -p /build/archiso-ff1/airootfs/etc/pacman.d
          cp /etc/pacman.d/mirrorlist /build/archiso-ff1/airootfs/etc/pacman.d/mirrorlist
          cp /build/archiso-ff1/airootfs/etc/pacman.d/feralfile-pkg-pubkey.asc /etc/pacman.d/feralfile-pkg-pubkey.asc

          pacman-key --add /etc/pacman.d/feralfile-pkg-pubkey.asc
          pacman-key --lsign-key AA6B250F2938F3CB

      - name: Update start-kiosk.sh
        if: ${{ inputs.dev_iso }}
        run: |
          sed -i 's/--kiosk//' /build/archiso-ff1/airootfs/home/feralfile/scripts/start-kiosk.sh

      - name: Add development tools to packages list
        if: ${{ inputs.dev_iso }}
        run: |
          cat >> /build/archiso-ff1/packages.x86_64 << EOF

          # Development tools
          go
          rust
          base-devel
          EOF
          sed -i 's/#NoConfirm/NoConfirm/' /etc/pacman.conf 2>/dev/null || echo "NoConfirm" >> /etc/pacman.conf

      - name: Setup source directory and copy components
        if: ${{ inputs.dev_iso }}
        run: |
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/src
          echo "Branch: ${{ github.ref_name }}" > /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          echo "Version: ${{ inputs.version }}" >> /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          echo "Build Date: $(date)" >> /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          cp -r ffos-user/components /build/archiso-ff1/airootfs/home/feralfile/src/

      - name: Inject pacman.conf for build and runtime
        run: |
          set -e

          ENVIRONMENT="${{ inputs.environment }}"

          if [ "$ENVIRONMENT" = "Production" ]; then
            DOMAIN="ffos.feralfile.com"
          else
            DOMAIN="ffosdev.feralfile.com"
          fi

          # Save the archiso profile's original pacman.conf before modifying
          cp /build/archiso-ff1/pacman.conf /build/archiso-ff1/pacman.conf.orig

          # Build-time pacman config:
          # Only the local repo with freshly built packages from selected tags.
          # The remote [feralfile] repo is NOT included here because the R2 path
          # may not exist for the branch/tag being built. All feralfile component
          # packages are built locally, so the remote repo is not needed at build time.
          cat >> /build/archiso-ff1/pacman.conf << EOF
          [feralfile-local]
          SigLevel = Optional TrustAll
          Server = file:///build/local-repo/\$arch
          EOF

          # Runtime pacman config inside ISO should point to remote R2 repo only,
          # so systems can update to latest packages from that channel.
          # Use archiso profile's original pacman.conf as base (not the container's /etc/pacman.conf)
          cp /build/archiso-ff1/pacman.conf.orig /build/archiso-ff1/airootfs/etc/pacman.conf
          cat >> /build/archiso-ff1/airootfs/etc/pacman.conf << EOF
          [feralfile]
          SigLevel = Required DatabaseOptional TrustedOnly
          Server = https://${DOMAIN}/archlinux/${{ github.ref_name }}/os/\$arch
          EOF

      - name: Copy UI files
        run: |
          mkdir -p /build/archiso-ff1/airootfs/opt/feral/ui/launcher
          cp -r ffos-user/components/launcher-ui/* /build/archiso-ff1/airootfs/opt/feral/ui/launcher/
          mkdir -p /build/archiso-ff1/airootfs/opt/feral/ui/player
          cp -r ffos-user/components/player-wrapper-ui/* /build/archiso-ff1/airootfs/opt/feral/ui/player/
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/.logs

      - name: Add Configs and Services
        env:
          FERAL_CONTROLD_CONFIG_JSON: ${{ secrets.FERAL_CONTROLD_CONFIG_JSON }}
          FERAL_FF1_CONFIG_JSON: ${{ secrets.FERAL_FF1_CONFIG_JSON }}
          FERAL_SYS_MONITORD_CONFIG_JSON: ${{ secrets.FERAL_SYS_MONITORD_CONFIG_JSON }}
          FERAL_WATCHDOG_CONFIG_JSON: ${{ secrets.FERAL_WATCHDOG_CONFIG_JSON }}
        run: |
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/.config

          write_json() {
            local target="$1"
            local content="$2"
            local name
            name="$(basename "$target")"

            if [ -z "$content" ]; then
              echo "::error::Missing ${name} JSON secret"
              exit 1
            fi

            printf '%s' "$content" | jq . > "$target"
            chmod 755 "$target"
          }

          write_json "/build/archiso-ff1/airootfs/home/feralfile/.config/controld.json" "$FERAL_CONTROLD_CONFIG_JSON"
          write_json "/build/archiso-ff1/airootfs/home/feralfile/.config/sys-monitord.json" "$FERAL_SYS_MONITORD_CONFIG_JSON"
          write_json "/build/archiso-ff1/airootfs/home/feralfile/.config/watchdog.json" "$FERAL_WATCHDOG_CONFIG_JSON"
          write_json "/build/archiso-ff1/airootfs/home/feralfile/ff1-config.json" "$FERAL_FF1_CONFIG_JSON"

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Configure AWS credentials (OIDC for KMS)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_KMS_FF1_RELEASE_SIGNER_ROLE_ARN }}
          aws-region: "ap-northeast-1"

      - name: Build, sign and upload ISO image
        run: |
          cd /build
          mkarchiso -v -w /build/work -o /build/out /build/archiso-ff1
          ISO_FILE=$(ls /build/out/*.iso | head -n 1)
          if [ -f "$ISO_FILE" ]; then
            IMAGE_TYPE="${{ inputs.dev_iso && 'dev-' || '' }}"
            if [ "${{ github.ref_name }}" = "release" ]; then
              IMAGE_TAG="-release"
            elif [ "${{ github.ref_name }}" = "demo" ]; then
              IMAGE_TAG="-demo"
            elif [ "${{ github.ref_name }}" = "develop" ]; then
              IMAGE_TAG="-develop"
            elif [ "${{ github.ref_name }}" = "staging" ]; then
              IMAGE_TAG="-staging"
            else
              IMAGE_TAG=""
            fi
            NEW_NAME="FF1${IMAGE_TAG}-${IMAGE_TYPE}${{ inputs.version }}.iso"
            mv "$ISO_FILE" "/build/out/$NEW_NAME"
            echo "ISO created: /build/out/$NEW_NAME"

            cd /build/out
            openssl dgst -sha256 -binary "$NEW_NAME" > iso.sha256

            SIGNATURE_B64=$(aws kms sign \
              --key-id "${{ secrets.AWS_KMS_FF1_RELEASE_SIGNING_KEY_ID }}" \
              --message fileb://iso.sha256 \
              --message-type DIGEST \
              --signing-algorithm RSASSA_PKCS1_V1_5_SHA_256 \
              --output text \
              --query Signature) || {
                echo "Error: AWS KMS signing failed"
                exit 1
              }
            if [ -z "$SIGNATURE_B64" ]; then
              echo "Error: Empty signature output from AWS KMS"
              exit 1
            fi
            echo "$SIGNATURE_B64" | base64 --decode > "$NEW_NAME.sig"
            echo "Signature written to $NEW_NAME.sig"

            rclone copyto "$NEW_NAME" \
              "r2:${{ vars.CLOUDFLARE_R2_BUCKET_NAME }}/${{ github.ref_name }}/$NEW_NAME" \
              --s3-upload-cutoff=100M \
              --s3-chunk-size=100M \
              --transfers=7 \
              --verbose \
              --stats=1s
            echo "Image successfully uploaded to R2: ${NEW_NAME}"

            rclone copyto "$NEW_NAME.sig" \
              "r2:${{ vars.CLOUDFLARE_R2_BUCKET_NAME }}/${{ github.ref_name }}/$NEW_NAME.sig" \
              --verbose
            echo "Image signature successfully uploaded to R2: ${NEW_NAME}.sig"
          else
            echo "Error: ISO file not found"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -rf /build
