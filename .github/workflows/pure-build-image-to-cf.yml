name: ▶️ Pure Build FFOS Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version'
        required: true
        default: '0.0.1'
      soak-test:
        description: 'Include soak test'
        required: true
        type: choice
        options:
          - true
          - false
        default: false
      environment:
        description: "Environment to build"
        required: true
        default: "Development"
        type: choice
        options:
          - Development
          - Staging
          - Production
      pacman_snapshot:
        description: "Pacman repository snapshot to use"
        required: false
        default: "2025/11/25"
        type: choice
        options:
          - "2025/11/25"
          - "2025/05/31"
          - "latest"
      ffos_user_ref:
        description: 'ffos-user repository reference'
        required: true
        type: string
        default: 'develop'
      ff_player_ref:
        description: "feral-player repository reference to build static export"
        required: true
        default: "main"
        type: string
      dev_iso:
        description: "Build development ISO"
        required: true
        default: false
        type: boolean
      enable_local_hub:
        description: "Enable local hub for communication"
        required: false
        default: true
        type: boolean
      update_min_version:
        description: "Update minimum runtime version (min_runtime_version)"
        required: true
        type: boolean
        default: true
      update_required_version:
        description: "Update minimum upgradeable version (min_upgradeable_version)"
        required: true
        type: boolean
        default: false
      update_recovery_version:
        description: "Update recovery version"
        required: true
        type: boolean
        default: false
permissions:
  id-token: write
  contents: read

jobs:
  permission-check:
    name: Permission Check
    uses: ./.github/workflows/permission-check.yaml

  resolve-container:
    needs: permission-check
    uses: ./.github/workflows/resolve-container.yaml
    with:
      pacman_snapshot: ${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}

  build-feral-player:
    name: Build feral-player Package
    needs: [permission-check, resolve-container]
    if: ${{ inputs.ff_player_ref != '' }}
    uses: ./.github/workflows/build-feral-player.yaml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
      AWS_KMS_FF1_RELEASE_SIGNER_ROLE_ARN: ${{ secrets.AWS_KMS_FF1_RELEASE_SIGNER_ROLE_ARN }}
      AWS_KMS_FF1_RELEASE_SIGNING_KEY_ID: ${{ secrets.AWS_KMS_FF1_RELEASE_SIGNING_KEY_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN_PLAYER: ${{ secrets.SENTRY_DSN_PLAYER }}
    with:
      version: ${{ inputs.version }}
      description: 'FF Player Static Web Application'
      maintainer: 'Feral File'
      environment: ${{ inputs.environment }}
      ff_player_ref: ${{ inputs.ff_player_ref }}
      pacman_snapshot: ${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}
      container_image: ${{ needs.resolve-container.outputs.image }}

  build-image:
    needs: [permission-check, resolve-container, build-feral-player]
    if: always() && !failure() && !cancelled()
    name: Generate FFOS iso
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    container:
      image: ${{ needs.resolve-container.outputs.image }}
      options: --privileged

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout ffos-user Repository
        uses: actions/checkout@v4
        with:
          repository: feral-file/ffos-user
          ref: ${{ inputs.ffos_user_ref }}
          path: ffos-user
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup pacman
        uses: ./.github/actions/setup-pacman
        with:
          pacman_snapshot: ${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm archiso arch-install-scripts dosfstools libisoburn squashfs-tools \
            git curl rclone wget base-devel jq zip unzip fakeroot binutils openssl aws-cli

      - name: Apply version-specific patches
        run: |
          if [ "${{ inputs.pacman_snapshot || github.event.inputs.pacman_snapshot }}" = "2025/05/31" ]; then
            echo "Applying patches for 2025/05/31 snapshot..."
            sed -i "s/bootmodes=('uefi.systemd-boot')/bootmodes=('uefi-x64.systemd-boot.esp' 'uefi-x64.systemd-boot.eltorito')/" archiso-ff1/profiledef.sh
            sed -i 's/wlroots0.18/wlroots/' archiso-ff1/packages.x86_64
          fi

      - name: Copy archiso profile and setup home directories
        run: |
          mkdir -p /build
          cp -r archiso-ff1 /build/

          # Create home directory structure
          mkdir -p /build/archiso-ff1/airootfs/home

          # Copy user data from ffos-user repository
          cp -r ffos-user/users/feralfile /build/archiso-ff1/airootfs/home/

          if [ "${{ inputs.soak-test }}" = "false" ]; then
            # Remove soaktest if not needed
            rm -f /build/archiso-ff1/efiboot/loader/entries/archiso-x86_64-linux-soak-test.conf
            rm -f /build/archiso-ff1/airootfs/usr/local/bin/websocat
          else
            # Copy soaktest user data
            cp -r ffos-user/users/soaktest /build/archiso-ff1/airootfs/home/

            cat >> /build/archiso-ff1/packages.x86_64 << EOF
          # soak test tools
          foot
          bc
          stress-ng
          mesa-utils
          python-rich
          EOF
          fi

          # CRITICAL: Create and set up the mirrorlist for the archiso build environment
          mkdir -p /build/archiso-ff1/pacman.d
          cp /etc/pacman.d/mirrorlist /build/archiso-ff1/pacman.d/mirrorlist

          # Also copy mirror list to the final ISO
          mkdir -p /build/archiso-ff1/airootfs/etc/pacman.d
          cp /etc/pacman.d/mirrorlist /build/archiso-ff1/airootfs/etc/pacman.d/mirrorlist
          cp /build/archiso-ff1/airootfs/etc/pacman.d/feralfile-pkg-pubkey.asc /etc/pacman.d/feralfile-pkg-pubkey.asc

          pacman-key --add /etc/pacman.d/feralfile-pkg-pubkey.asc
          pacman-key --lsign-key AA6B250F2938F3CB

          echo "Feral File pacman key added successfully."

      - name: Update start-kiosk.sh
        if: ${{ inputs.dev_iso }}
        run: |
          sed -i 's/--kiosk//' \
            /build/archiso-ff1/airootfs/home/feralfile/scripts/start-kiosk.sh

      - name: Add development tools to packages list
        if: ${{ inputs.dev_iso }}
        run: |
          # Add Go and Rust to packages list
          cat >> /build/archiso-ff1/packages.x86_64 << EOF

          # Development tools
          go
          rust
          base-devel
          EOF

          # Configure pacman to not ask for input
          sed -i 's/#NoConfirm/NoConfirm/' /etc/pacman.conf 2>/dev/null || echo "NoConfirm" >> /etc/pacman.conf

      - name: Setup source directory and copy components
        if: ${{ inputs.dev_iso }}
        run: |
          # Create source directory
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/src

          # Create a file with repository information
          echo "Branch: ${{ github.ref_name }}" > /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          echo "Version: ${{ inputs.version }}" >> /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt
          echo "Build Date: $(date)" >> /build/archiso-ff1/airootfs/home/feralfile/src/repo-info.txt

          # Copy components directory with current checkout
          cp -r ffos-user/components /build/archiso-ff1/airootfs/home/feralfile/src/

      - name: Inject pacman.conf
        run: |
          set -e

          ENVIRONMENT="${{ inputs.environment }}"

          if [ "$ENVIRONMENT" = "Production" ]; then
            DOMAIN="ffos.feralfile.com"
          else
            DOMAIN="ffosdev.feralfile.com"
          fi

          cat >> /build/archiso-ff1/pacman.conf << EOF
          [feralfile]
          SigLevel = Required DatabaseOptional TrustedOnly
          Server = https://${DOMAIN}/archlinux/${{ github.ref_name }}/os/\$arch
          EOF

          cp /build/archiso-ff1/pacman.conf /build/archiso-ff1/airootfs/etc/pacman.conf

      - name: Copy UI files
        run: |
          mkdir -p /build/archiso-ff1/airootfs/opt/feral/ui/launcher
          cp -r ffos-user/components/launcher-ui/* /build/archiso-ff1/airootfs/opt/feral/ui/launcher/
          mkdir -p /build/archiso-ff1/airootfs/opt/feral/ui/player
          cp -r ffos-user/components/player-wrapper-ui/* /build/archiso-ff1/airootfs/opt/feral/ui/player/
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/.logs

      - name: Add Configs and Services
        env:
          FERAL_CONTROLD_CONFIG_JSON: ${{ secrets.FERAL_CONTROLD_CONFIG_JSON }}
          FERAL_FF1_CONFIG_JSON: ${{ secrets.FERAL_FF1_CONFIG_JSON }}
          FERAL_SYS_MONITORD_CONFIG_JSON: ${{ secrets.FERAL_SYS_MONITORD_CONFIG_JSON }}
          FERAL_WATCHDOG_CONFIG_JSON: ${{ secrets.FERAL_WATCHDOG_CONFIG_JSON }}
        run: |
          mkdir -p /build/archiso-ff1/airootfs/home/feralfile/.config

          write_json() {
            local target="$1"
            local content="$2"
            local name
            name="$(basename "$target")"

            if [ -z "$content" ]; then
              echo "::error::Missing ${name} JSON secret"
              exit 1
            fi

            printf '%s' "$content" | jq . > "$target"
            chmod 755 "$target"
          }

          write_json "/build/archiso-ff1/airootfs/home/feralfile/.config/controld.json" "$FERAL_CONTROLD_CONFIG_JSON"
          write_json "/build/archiso-ff1/airootfs/home/feralfile/.config/sys-monitord.json" "$FERAL_SYS_MONITORD_CONFIG_JSON"
          write_json "/build/archiso-ff1/airootfs/home/feralfile/.config/watchdog.json" "$FERAL_WATCHDOG_CONFIG_JSON"
          write_json "/build/archiso-ff1/airootfs/home/feralfile/ff1-config.json" "$FERAL_FF1_CONFIG_JSON"

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Configure AWS cred entials (OIDC for KMS)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_KMS_FF1_RELEASE_SIGNER_ROLE_ARN }}
          aws-region: 'ap-northeast-1'

      - name: Build, sign and upload ISO Image
        run: |
          cd /build
          mkarchiso -v -w /build/work -o /build/out /build/archiso-ff1
          ISO_FILE=$(find /build/out -name "*.iso" | head -n 1)
          if [ -f "$ISO_FILE" ]; then
            IMAGE_TYPE="${{ inputs.dev_iso && 'dev-' || '' }}"
            if [ "${{ github.ref_name }}" = "release" ]; then
              IMAGE_TAG="-release"
            elif [ "${{ github.ref_name }}" = "demo" ]; then
              IMAGE_TAG="-demo"
            elif [ "${{ github.ref_name }}" = "develop" ]; then
              IMAGE_TAG="-develop"
            elif [ "${{ github.ref_name }}" = "staging" ]; then
              IMAGE_TAG="-staging"
            else
              IMAGE_TAG=""
            fi
            NEW_NAME="FF1${IMAGE_TAG}-${IMAGE_TYPE}${{ inputs.version }}.iso"
            mv "$ISO_FILE" "/build/out/$NEW_NAME"
            echo "ISO created: /build/out/$NEW_NAME"

            cd /build/out

            openssl dgst -sha256 -binary "$NEW_NAME" > iso.sha256

            SIGNATURE_B64=$(aws kms sign \
              --key-id "${{ secrets.AWS_KMS_FF1_RELEASE_SIGNING_KEY_ID }}" \
              --message fileb://iso.sha256 \
              --message-type DIGEST \
              --signing-algorithm RSASSA_PKCS1_V1_5_SHA_256 \
              --output text \
              --query Signature) || {
                echo "Error: AWS KMS signing failed"
                exit 1
              }
            if [ -z "$SIGNATURE_B64" ]; then
              echo "Error: Empty signature output from AWS KMS"
              exit 1
            fi
            echo "$SIGNATURE_B64" | base64 --decode > "$NEW_NAME.sig"
            echo "Signature written to $NEW_NAME.sig"

            rclone copyto "$NEW_NAME" \
              "r2:${{vars.CLOUDFLARE_R2_BUCKET_NAME}}/${{ github.ref_name }}/$NEW_NAME" \
              --s3-upload-cutoff=100M \
              --s3-chunk-size=100M \
              --transfers=7 \
              --verbose \
              --stats=1s
            echo "Image successfully uploaded to R2: ${NEW_NAME}"

            rclone copyto "$NEW_NAME.sig" \
              "r2:${{vars.CLOUDFLARE_R2_BUCKET_NAME}}/${{ github.ref_name }}/$NEW_NAME.sig" \
              --verbose
            echo "Image signature successfully uploaded to R2: ${NEW_NAME}.sig"
          else
            echo "Error: ISO file not found"
            exit 1
          fi

      - name: Update version info JSON
        run: |
          set -e

          VERSION_INFO_PATH="${{ github.ref_name }}/version-info.json"
          VERSION_INFO_FILE="/tmp/version-info.json"
          CURRENT_VERSION="${{ inputs.version }}"
          UPDATE_MIN_VERSION="${{ inputs.update_min_version }}"
          UPDATE_REQUIRED_VERSION="${{ inputs.update_required_version }}"
          UPDATE_RECOVERY_VERSION="${{ inputs.update_recovery_version }}"

          # Try to download existing version info JSON
          if rclone copyto "r2:${{vars.CLOUDFLARE_R2_BUCKET_NAME}}/${VERSION_INFO_PATH}" "$VERSION_INFO_FILE" 2>/dev/null; then
            echo "Downloaded existing version-info.json"
            # Validate JSON and read existing values
            if ! jq empty "$VERSION_INFO_FILE" 2>/dev/null; then
              echo "Warning: Existing JSON is invalid, creating new one"
              echo '{}' > "$VERSION_INFO_FILE"
              EXISTING_RECOVERY=""
              EXISTING_UPGRADEABLE=""
              EXISTING_RUNTIME=""
            else
              EXISTING_UPGRADEABLE=$(jq -r '.min_upgradeable_version // ""' "$VERSION_INFO_FILE" 2>/dev/null || echo "")
              EXISTING_RUNTIME=$(jq -r '.min_runtime_version // ""' "$VERSION_INFO_FILE" 2>/dev/null || echo "")
              EXISTING_RECOVERY=$(jq -r '.recovery_version // ""' "$VERSION_INFO_FILE" 2>/dev/null || echo "")
            fi
          else
            echo "No existing version-info.json found, creating new one"
            EXISTING_RECOVERY=""
            EXISTING_UPGRADEABLE=""
            EXISTING_RUNTIME=""
            echo '{}' > "$VERSION_INFO_FILE"
          fi

          # Prepare updated JSON - always update latest_version
          jq --arg latest "$CURRENT_VERSION" '.latest_version = $latest' "$VERSION_INFO_FILE" > "${VERSION_INFO_FILE}.tmp"
          mv "${VERSION_INFO_FILE}.tmp" "$VERSION_INFO_FILE"

          # Update min_upgradeable_version if checkbox is checked
          if [ "$UPDATE_REQUIRED_VERSION" = "true" ] || [ "$UPDATE_REQUIRED_VERSION" = true ]; then
            jq --arg upgradeable "$CURRENT_VERSION" '.min_upgradeable_version = $upgradeable' "$VERSION_INFO_FILE" > "${VERSION_INFO_FILE}.tmp"
            mv "${VERSION_INFO_FILE}.tmp" "$VERSION_INFO_FILE"
            echo "Updated min_upgradeable_version to $CURRENT_VERSION"
          elif [ -n "$EXISTING_UPGRADEABLE" ] && [ "$EXISTING_UPGRADEABLE" != "null" ] && [ "$EXISTING_UPGRADEABLE" != "" ]; then
            # Keep existing min_upgradeable_version if not updating
            jq --arg upgradeable "$EXISTING_UPGRADEABLE" '.min_upgradeable_version = $upgradeable' "$VERSION_INFO_FILE" > "${VERSION_INFO_FILE}.tmp"
            mv "${VERSION_INFO_FILE}.tmp" "$VERSION_INFO_FILE"
            echo "Kept existing min_upgradeable_version: $EXISTING_UPGRADEABLE"
          fi

          # Update min_runtime_version if checkbox is checked
          if [ "$UPDATE_MIN_VERSION" = "true" ] || [ "$UPDATE_MIN_VERSION" = true ]; then
            jq --arg runtime "$CURRENT_VERSION" '.min_runtime_version = $runtime' "$VERSION_INFO_FILE" > "${VERSION_INFO_FILE}.tmp"
            mv "${VERSION_INFO_FILE}.tmp" "$VERSION_INFO_FILE"
            echo "Updated min_runtime_version to $CURRENT_VERSION"
          elif [ -n "$EXISTING_RUNTIME" ] && [ "$EXISTING_RUNTIME" != "null" ] && [ "$EXISTING_RUNTIME" != "" ]; then
            # Keep existing min_runtime_version if not updating
            jq --arg runtime "$EXISTING_RUNTIME" '.min_runtime_version = $runtime' "$VERSION_INFO_FILE" > "${VERSION_INFO_FILE}.tmp"
            mv "${VERSION_INFO_FILE}.tmp" "$VERSION_INFO_FILE"
            echo "Kept existing min_runtime_version: $EXISTING_RUNTIME"
          fi

          # Update recovery_version if checkbox is checked
          if [ "$UPDATE_RECOVERY_VERSION" = "true" ] || [ "$UPDATE_RECOVERY_VERSION" = true ]; then
            jq --arg recovery "$CURRENT_VERSION" '.recovery_version = $recovery' "$VERSION_INFO_FILE" > "${VERSION_INFO_FILE}.tmp"
            mv "${VERSION_INFO_FILE}.tmp" "$VERSION_INFO_FILE"
            echo "Updated recovery_version to $CURRENT_VERSION"
          elif [ -n "$EXISTING_RECOVERY" ] && [ "$EXISTING_RECOVERY" != "null" ] && [ "$EXISTING_RECOVERY" != "" ]; then
            # Keep existing recovery_version if not updating
            jq --arg recovery "$EXISTING_RECOVERY" '.recovery_version = $recovery' "$VERSION_INFO_FILE" > "${VERSION_INFO_FILE}.tmp"
            mv "${VERSION_INFO_FILE}.tmp" "$VERSION_INFO_FILE"
            echo "Kept existing recovery_version: $EXISTING_RECOVERY"
          fi

          # Display final JSON
          echo "Final version-info.json:"
          cat "$VERSION_INFO_FILE" | jq .

          # Validate final JSON before uploading
          if ! jq empty "$VERSION_INFO_FILE" 2>/dev/null; then
            echo "Error: Generated JSON is invalid"
            exit 1
          fi

          # Upload updated JSON to R2
          rclone copyto "$VERSION_INFO_FILE" \
            "r2:${{vars.CLOUDFLARE_R2_BUCKET_NAME}}/${VERSION_INFO_PATH}" \
            --verbose
          echo "Version info JSON successfully uploaded to R2: ${VERSION_INFO_PATH}"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /build
